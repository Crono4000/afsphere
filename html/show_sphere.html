<html>
<head>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        {{ content | safe }}
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#AddFile">Add file</button>
    </div>
    <div class="modal fade" id="AddFile">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Upload file</h5>
                </div>

                <form class="modal-body" id="uploadForm" action="/upload" method="post" >
                        <input type="hidden" name="sphere" value="{{ sphere | safe }}">

                        <label>Choose file:</label> <br>
                        <input type="file" id="choose_file_id" name="file"><br><br>
                        
                        <button type="submit" class="btn btn-primary">Enviar</button>
                </form>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">close</button>
                </div>
            </div>
        </div>
        <script>
            const form = document.getElementById("uploadForm");

            form.addEventListener("submit", async (e) => {
                e.preventDefault(); // impede a navegação

                const formData = new FormData(form);

                const response = await fetch("/upload", {
                    method: "POST",
                    body: formData
                });

                const jso = await response.json();
                if(!response.ok){
                    alert(jso.error);
                } else {
                    var modalElement = document.getElementById('AddFile');
                    var modal = bootstrap.Modal.getInstance(modalElement);
                    modal.hide();

                    document.getElementById("choose_file_id").value = "";
                }
            });
        </script>
    </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
